name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            artifact_name: codex-profile-manager-windows
            artifact_glob: build/bin/*.exe
          - os: macos-latest
            platform: darwin/universal
            artifact_name: codex-profile-manager-macos
            artifact_glob: build/bin/*.zip
          - os: ubuntu-22.04
            platform: linux/amd64
            artifact_name: codex-profile-manager-linux
            artifact_glob: build/bin/codex-profile-manager

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Build
        run: wails build -platform ${{ matrix.platform }} -clean

      - name: Package macOS .app bundle
        if: matrix.os == 'macos-latest'
        working-directory: build/bin
        run: zip -r codex-profile-manager-macos.zip codex-profile-manager.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
